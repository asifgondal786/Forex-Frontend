name: forex_companion
description: AI-powered Forex trading assistant
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.6.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Phase 16 — Professional Charting
  flutter_inappwebview: ^6.1.5
  # stipe and payfast
  flutter_stripe: ^10.2.0

  # UI
  cupertino_icons: ^1.0.8
  flutter_animate: ^4.2.0
  fl_chart: ^0.68.0
  google_fonts: ^6.1.0

  # State Management
  provider: ^6.1.1

  # HTTP & WebSocket
  http: ^1.2.0
  web_socket_channel: ^3.0.3

  # Date Formatting
  intl: ^0.20.2

  # Firebase
  firebase_core: ^4.3.0
  firebase_auth: ^6.1.3
  cloud_firestore: ^6.1.1
  firebase_storage: ^13.0.5
  firebase_messaging: ^16.1.1

  # Local Storage
  shared_preferences: ^2.2.2

  # Utilities
  uuid: ^4.3.3
  logging: ^1.2.0
  flutter_local_notifications: ^20.0.0
  webview_flutter: ^4.13.1
  url_launcher: ^6.3.0
  web: ^1.1.1
  sentry_flutter: ^9.14.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/tradingview_chart.html
# 
